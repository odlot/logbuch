name: Release

on:
  push:
    branches: [develop]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.guard.outputs.should_release }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Check if release should run
        id: guard
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if [[ "$COMMIT_MSG" == chore:\ bump\ version\ to\ * ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: version bump commit"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine next version
        if: steps.guard.outputs.should_release == 'true'
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="0.1.0"
          else
            CURRENT="${LATEST_TAG#v}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEXT_VERSION}"

      - name: Generate changelog
        if: steps.guard.outputs.should_release == 'true'
        id: changelog
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" "${LATEST_TAG}..HEAD")
          fi
          # Filter out chore commits and write to output
          CHANGELOG=$(echo "$LOG" | grep -v "^- chore:" || true)
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Bump version in Cargo.toml
        if: steps.guard.outputs.should_release == 'true'
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml

      - name: Commit and push version bump
        if: steps.guard.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          if git diff --cached --quiet; then
            echo "Cargo.toml already at target version, skipping commit"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
            git push origin HEAD:develop
          fi

      - name: Fast-forward push to main
        if: steps.guard.outputs.should_release == 'true'
        run: |
          git push origin HEAD:main

      - name: Create tag
        if: steps.guard.outputs.should_release == 'true'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: logbuch-linux-aarch64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: logbuch-darwin-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.prepare.outputs.version }}"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary
        run: cp target/release/logbuch ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.prepare.outputs.version }}"
          name: "v${{ needs.prepare.outputs.version }}"
          body: |
            ## Changelog

            ${{ needs.prepare.outputs.changelog }}
          files: |
            logbuch-linux-aarch64/logbuch-linux-aarch64
            logbuch-darwin-aarch64/logbuch-darwin-aarch64
